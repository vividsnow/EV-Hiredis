name: "Test"
on:
  pull_request:
  push:
    branches:
      - "master"
  workflow_dispatch:

jobs:
  test-xt:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: "5.40"
          install-modules-with: cpm
          install-modules-args: --with-develop --with-configure
          install-modules: |
            Test::CPAN::Meta
            Test::Pod
            Test::Spellunker
            Test::MinimumVersion::Fast

      - name: Set up Redis
        uses: shogo82148/actions-setup-redis@v1
        with:
          redis-version: "7.4"
          auto-start: false

      - name: Test
        run: |
          perl Makefile.PL && make && RELEASE_TESTING=1 make test

  list:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: list
        id: set-matrix
        run: |
          import json
          import os
          perl = [
              '5.40',
              '5.38',
              '5.36',
              '5.34',
              '5.32',
              '5.30',
              '5.28',
              '5.26',
              '5.24',
              '5.22',
              '5.20',
              '5.18',
              '5.16',
              '5.14'
          ]
          redis = [
              '7.4',
              '7.2',
              '7.0',
              '6.2',
              '6.0',
              '5.0',
          ]
          includes = []
          for r in redis:
              includes.append({'perl': perl[0], 'redis': r, 'os': 'macos-latest'})
          matrix = {
              'perl': perl,
              'redis': redis,
              'os': ['ubuntu-latest'],
              'include': includes
          }
          output = json.dumps(matrix, separators=(',', ':'))
          with open(os.environ["GITHUB_OUTPUT"], 'a', encoding="utf-8") as f:
            f.write('matrix={0}\n'.format(output))
        shell: python

  test:
    runs-on: ${{ matrix.os }}
    needs: list

    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.list.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Perl ${{ matrix.perl }}
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}
          install-modules-with: cpanm
          install-modules-args: --with-configure --with-test --notest

      - name: Set up Redis ${{ matrix.redis }}
        uses: shogo82148/actions-setup-redis@v1
        with:
          redis-version: ${{ matrix.redis }}
          auto-start: false

      - name: Test
        run: |
          perl Makefile.PL && make && make test

  test-valkey:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: "5.40"
          install-modules-with: cpm
          install-modules-args: --with-configure --with-test

      - name: Install Valkey
        run: |
          sudo apt-get update
          sudo apt-get install -y valkey-server openssl
          valkey-server --version
          # Test::RedisServer looks for redis-server; symlink valkey-server
          sudo ln -sf "$(which valkey-server)" /usr/local/bin/redis-server

      - name: Test
        run: |
          perl Makefile.PL && make && make test

  test-alpine:
    runs-on: ubuntu-latest
    container: alpine:latest

    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache perl perl-dev perl-app-cpanminus make gcc musl-dev pkgconf openssl-dev openssl redis git

      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Perl modules
        run: |
          cpanm -n EV EV::MakeMaker File::Which Test::Deep Test::TCP Test::RedisServer Devel::Refcount

      - name: Test
        run: |
          redis-server --daemonize yes
          perl Makefile.PL && make && make test

  test-freebsd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y perl5 gmake pkgconf openssl redis
            pkg install -y p5-App-cpanminus p5-EV p5-File-Which p5-Test-Deep p5-Test-TCP
            cpanm -n Test::RedisServer Devel::Refcount
          run: |
            export PATH="/usr/local/sbin:/usr/local/bin:$PATH"
            which redis-server || echo "redis-server not found in PATH=$PATH"
            perl Makefile.PL && make && make test

  test-openbsd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Test on OpenBSD
        uses: vmactions/openbsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg_add gmake pkgconf redis curl
            pkg_add p5-EV
            curl -L https://cpanmin.us | perl - App::cpanminus
            cpanm -n File::Which Test::Deep Test::TCP Test::RedisServer Devel::Refcount
          run: |
            export PATH="/usr/local/sbin:/usr/local/bin:$PATH"
            which redis-server || echo "redis-server not found in PATH=$PATH"
            perl Makefile.PL && make && make test
